<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積もりツール β | asai-south</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f8fc; --bg2: #ffffff; --bg3: #f0f2f8; --border: #e2e6f0;
  --accent: #4f7ef8; --accent2: #2563eb; --green: #059669; --yellow: #d97706; --red: #dc2626;
  --text: #1e293b; --text2: #475569; --text3: #94a3b8;
  --mono: 'JetBrains Mono', monospace; --sans: 'Noto Sans JP', sans-serif;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(79,126,248,.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; min-height: 100vh; }

header {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 60px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
}
.logo { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: .05em; }
.logo span { color: var(--text3); }
.hbadge { background: linear-gradient(135deg, #4f7ef8, #7c3aed); color: #fff; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 99px; letter-spacing: .04em; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.rate-wrap { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 2px solid var(--border); border-radius: 10px; padding: 6px 14px; transition: border-color .15s; }
.rate-wrap:focus-within { border-color: var(--accent); }
.rate-label { font-size: 13px; color: var(--text3); font-family: var(--mono); font-weight: 600; }
.rate-input { background: transparent; border: none; color: var(--accent2); font-family: var(--mono); font-size: 17px; font-weight: 700; width: 72px; text-align: right; outline: none; }

.main { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 60px); }

.left { background: #fff; border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; max-height: calc(100vh - 60px); position: sticky; top: 60px; }
.right { padding: 28px 36px; overflow-y: auto; background: var(--bg); }

.sec-title { font-size: 12px; font-weight: 700; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }

.scale-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.scale-btn { background: var(--bg3); border: 2px solid var(--border); border-radius: 10px; padding: 12px 8px; cursor: pointer; text-align: center; transition: all .15s; color: var(--text2); }
.scale-btn:hover { border-color: var(--accent); color: var(--text); background: #f0f4ff; }
.scale-btn.active { background: linear-gradient(135deg, #eff4ff, #f5f0ff); border-color: var(--accent); color: var(--accent2); box-shadow: var(--shadow-md); }
.scale-name { font-weight: 700; font-size: 15px; display: block; margin-bottom: 4px; }
.scale-desc { font-size: 12px; color: var(--text3); line-height: 1.4; }
.scale-btn.active .scale-desc { color: var(--accent); }

.page-types { display: flex; flex-direction: column; gap: 6px; }
.pt-row { display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 8px; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; transition: border-color .15s; }
.pt-row:hover { border-color: #c7d4f8; }
.pt-row.disabled { opacity: .35; pointer-events: none; }
.pt-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.pt-hours { font-family: var(--mono); font-size: 12px; color: var(--text3); }
.pt-note { font-size: 12px; color: var(--accent); opacity: .8; margin-top: 2px; }
.qty-btn { width: 26px; height: 26px; background: #fff; border: 1.5px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; transition: all .1s; flex-shrink: 0; box-shadow: var(--shadow); }
.qty-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(1.1); }
.qty-disp { font-family: var(--mono); font-size: 17px; font-weight: 700; color: var(--accent2); width: 26px; text-align: center; flex-shrink: 0; }

.fixed-items { display: flex; flex-direction: column; gap: 6px; }
.toggle-row { display: flex; align-items: center; gap: 10px; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: border-color .15s; }
.toggle-row:hover { border-color: #c7d4f8; }
.toggle { width: 38px; height: 22px; background: #cbd5e1; border-radius: 99px; position: relative; transition: background .2s; flex-shrink: 0; }
.toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: all .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle.on { background: var(--accent); }
.toggle.on::after { left: 19px; }
.toggle-label { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.toggle-hours { font-family: var(--mono); font-size: 12px; color: var(--text3); font-weight: 600; }

.notes-area { background: var(--bg3); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; width: 100%; color: var(--text); font-family: var(--sans); font-size: 14px; resize: vertical; min-height: 72px; outline: none; transition: border-color .15s; }
.notes-area:focus { border-color: var(--accent); background: #fff; }
.notes-area::placeholder { color: var(--text3); }

.client-input { background: var(--bg3); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; width: 100%; color: var(--text); font-family: var(--sans); font-size: 15px; font-weight: 700; outline: none; transition: all .15s; }
.client-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(79,126,248,.1); }
.client-input::placeholder { color: var(--text3); font-weight: 400; }

.actions { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-family: var(--sans); font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: all .15s; box-shadow: var(--shadow); }
.btn-green { background: linear-gradient(135deg, #059669, #047857); color: #fff; }
.btn-green:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(5,150,105,.3); }
.btn-secondary { background: #fff; color: var(--text2); border: 1.5px solid var(--border); box-shadow: var(--shadow); }
.btn-secondary:hover { background: var(--bg3); color: var(--text); border-color: #c7d4f8; }

.scale-info { background: linear-gradient(135deg, #eff4ff, #f5f0ff); border: 1.5px solid #c7d4f8; border-radius: 10px; padding: 10px 16px; margin-bottom: 20px; font-size: 13px; color: var(--accent2); font-family: var(--mono); display: flex; gap: 16px; flex-wrap: wrap; font-weight: 600; }
.scale-info span { color: var(--text3); margin-right: 4px; font-weight: 400; }

.breakdown { background: #fff; border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); }
.breakdown-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg3); }
.breakdown-title { font-size: 14px; font-weight: 700; letter-spacing: .06em; color: var(--text2); }

table { width: 100%; border-collapse: collapse; }
thead th { background: var(--bg3); padding: 10px 20px; font-size: 12px; font-weight: 700; letter-spacing: .08em; color: var(--text3); text-transform: uppercase; text-align: left; border-bottom: 1.5px solid var(--border); }
thead th:not(:first-child) { text-align: right; }
tbody tr { border-top: 1px solid var(--border); transition: background .1s; }
tbody tr:hover { background: #f8faff; }
tbody td { padding: 12px 20px; font-size: 15px; color: var(--text); }
tbody td:not(:first-child) { text-align: right; font-family: var(--mono); color: var(--text2); font-weight: 500; }
.row-label { font-weight: 500; }
.rbadge { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .06em; padding: 2px 7px; border-radius: 99px; margin-left: 6px; vertical-align: middle; }
.bt { background: #dbeafe; color: #1d4ed8; }
.bf { background: #f1f5f9; color: #475569; }
.bc { background: #d1fae5; color: #065f46; }
.bp { background: #fef3c7; color: #92400e; }
.bfm { background: #fee2e2; color: #991b1b; }
.bd { background: #ede9fe; color: #5b21b6; }
.bw { background: #fef9c3; color: #713f12; }
.bdb { background: #ffedd5; color: #9a3412; }

tfoot tr td { padding: 16px 20px; background: linear-gradient(135deg, #eff4ff, #f5f0ff); font-weight: 700; border-top: 2px solid #c7d4f8; color: var(--accent2); font-family: var(--mono); font-size: 18px; text-align: right; }
tfoot tr td:first-child { color: var(--text); font-family: var(--sans); text-align: left; font-size: 16px; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

.toast { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, #059669, #047857); color: #fff; padding: 12px 22px; border-radius: 10px; font-weight: 700; font-size: 15px; z-index: 999; opacity: 0; transform: translateY(8px); transition: all .2s; pointer-events: none; box-shadow: 0 4px 16px rgba(5,150,105,.3); }
.toast.show { opacity: 1; transform: translateY(0); }

::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg3); border-radius: 12px; padding: 4px; }
.tab { flex: 1; padding: 10px; border: none; border-radius: 9px; background: transparent; font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--text3); cursor: pointer; transition: all .15s; }
.tab.active { background: #fff; color: var(--accent2); box-shadow: var(--shadow); }
.tab:hover:not(.active) { color: var(--text); }

.btn-save { background: linear-gradient(135deg, #4f7ef8, #7c3aed); color: #fff; }
.btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,126,248,.35); }

.history-toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
.history-search { flex: 1; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 16px; font-family: var(--sans); font-size: 15px; color: var(--text); outline: none; transition: border-color .15s; }
.history-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,126,248,.1); }
.history-search::placeholder { color: var(--text3); }

.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-card { background: #fff; border: 1.5px solid var(--border); border-radius: 12px; padding: 16px 20px; cursor: pointer; transition: all .15s; }
.history-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.hc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.hc-client { font-size: 16px; font-weight: 700; color: var(--text); }
.hc-date { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.hc-bottom { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.hc-amount { font-size: 18px; font-weight: 700; color: var(--accent2); font-family: var(--mono); }
.hc-scale { font-size: 12px; background: var(--bg3); border-radius: 6px; padding: 3px 10px; color: var(--text2); font-weight: 600; }
.hc-hours { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.hc-notes { font-size: 12px; color: var(--text3); margin-top: 6px; }
</style>
</head>
<body>

<header>
  <div class="logo">asai-south / <span>estimate-tool</span></div>
  <div class="hbadge">β</div>
  <div class="header-right">
    <div class="rate-wrap">
      <span class="rate-label">単価 ¥</span>
      <input type="number" class="rate-input" id="rateInput" value="5000" step="500">
      <span class="rate-label">/ h</span>
    </div>
  </div>
</header>

<div class="main">
  <div class="left">
    <div>
      <div class="sec-title">クライアント名</div>
      <input type="text" class="client-input" id="clientName" placeholder="例：株式会社サウスエージェンシー">
    </div>
    <div>
      <div class="sec-title">サイト規模</div>
      <div class="scale-grid">
        <button class="scale-btn" data-scale="small" onclick="setScale('small')">
          <span class="scale-name">小規模</span>
          <span class="scale-desc">5P以下<br>カスタム投稿なし</span>
        </button>
        <button class="scale-btn active" data-scale="normal" onclick="setScale('normal')">
          <span class="scale-name">通常</span>
          <span class="scale-desc">6〜16P<br>標準構成</span>
        </button>
        <button class="scale-btn" data-scale="large" onclick="setScale('large')">
          <span class="scale-name">大規模</span>
          <span class="scale-desc">17P以上<br>機能多数</span>
        </button>
      </div>
    </div>
    <div>
      <div class="sec-title">ページ種別 / 件数</div>
      <div class="page-types" id="pageTypes"></div>
    </div>
    <div>
      <div class="sec-title">固定項目</div>
      <div class="fixed-items" id="fixedItems"></div>
    </div>
    <div>
      <div class="sec-title">備考・メモ</div>
      <textarea class="notes-area" id="notesInput" placeholder="手動調整メモ、特記事項など…"></textarea>
    </div>
  </div>

  <div class="right">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('estimate')">📋 見積もり</button>
      <button class="tab" onclick="switchTab('history')">🕐 履歴</button>
    </div>
    <div id="tabEstimate">
      <div class="actions">
        <button class="btn btn-save" onclick="saveEstimate()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存
        </button>
        <button class="btn btn-green" onclick="exportCSV()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          CSVダウンロード
        </button>
        <button class="btn btn-secondary" onclick="copyText()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          コピー
        </button>
        <button class="btn btn-secondary" onclick="resetAll()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12a9 9 0 101.69-5.25L3 3v4h4"/></svg>
          リセット
        </button>
      </div>
      <div class="scale-info" id="scaleInfo"></div>
      <div class="breakdown">
        <div class="breakdown-header">
          <div class="breakdown-title">見積明細</div>
          <div style="font-size:13px;color:var(--text3);font-family:var(--mono)" id="clientLabel"></div>
        </div>
        <div id="tableWrap"></div>
      </div>
    </div>
    <div id="tabHistory" style="display:none">
      <div class="history-toolbar">
        <input type="text" class="history-search" id="historySearch" placeholder="クライアント名で検索…" oninput="filterHistory()">
        <button class="btn btn-secondary" onclick="loadHistory()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12a9 9 0 101.69-5.25L3 3v4h4"/></svg>
          更新
        </button>
      </div>
      <div id="historyWrap"><div class="empty-state"><div class="icon">🕐</div><p>読み込み中…</p></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCALES = {
  small:  { label: '小規模（5P以下）', top: { design: 16, coding: 24 } },
  normal: { label: '通常（6〜16P）',   top: { design: 24, coding: 40 } },
  large:  { label: '大規模（17P+）',   top: { design: 32, coding: 56 } },
};

const PT_DEF = [
  { key: 'top',    label: 'トップページ',   cls: 'bt',  design: null, coding: null, maxQty: 1, scaleKey: true },
  { key: 'fixed',  label: '固定ページ',     cls: 'bf',  design: 2,    coding: 2 },
  { key: 'custom', label: 'カスタム投稿',   cls: 'bc',  design: 4,    coding: 8,  noSmall: true, note: '1スラッグ1件カウント' },
  { key: 'post',   label: '通常投稿',       cls: 'bp',  design: 2,    coding: 8,  noSmall: true, note: '1スラッグ1件カウント' },
  { key: 'form',   label: 'フォームページ', cls: 'bfm', design: 2,    coding: 6 },
];

const FX_DEF = [
  { key: 'wp',    label: 'WordPress構築費', hours: 8,  cls: 'bw' },
  { key: 'debug', label: 'デバッグ費',       hours: 16, cls: 'bdb' },
];

let S = {
  scale: 'normal',
  qty: { top: 1, fixed: 0, custom: 0, post: 0, form: 0 },
  fx: { wp: true, debug: true },
};

function init() {
  renderPT(); renderFX(); render();
  document.getElementById('rateInput').addEventListener('input', render);
  document.getElementById('clientName').addEventListener('input', render);
}

function setScale(sc) {
  S.scale = sc;
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.toggle('active', b.dataset.scale === sc));
  if (sc === 'small') { S.qty.custom = 0; S.qty.post = 0; }
  renderPT(); render();
}

function renderPT() {
  const wrap = document.getElementById('pageTypes');
  wrap.innerHTML = '';
  PT_DEF.forEach(pt => {
    const dis = pt.noSmall && S.scale === 'small';
    const q = S.qty[pt.key] || 0;
    let hStr;
    if (pt.scaleKey) {
      const sc = SCALES[S.scale];
      hStr = `デザイン${sc.top.design}h + 構築${sc.top.coding}h`;
    } else {
      hStr = `デザイン${pt.design}h + 構築${pt.coding}h`;
    }
    const row = document.createElement('div');
    row.className = 'pt-row' + (dis ? ' disabled' : '');
    row.innerHTML = `
      <div>
        <div class="pt-name">${pt.label}</div>
        <div class="pt-hours">${hStr}</div>
        ${pt.note ? `<div class="pt-note">${pt.note}</div>` : ''}
      </div>
      <button class="qty-btn" onclick="chQty('${pt.key}',-1)">−</button>
      <div class="qty-disp" id="q-${pt.key}">${q}</div>
      <button class="qty-btn" onclick="chQty('${pt.key}',1)">＋</button>
    `;
    wrap.appendChild(row);
  });
}

function chQty(key, d) {
  const max = PT_DEF.find(p => p.key === key)?.maxQty || 99;
  S.qty[key] = Math.max(0, Math.min(max, (S.qty[key] || 0) + d));
  document.getElementById('q-' + key).textContent = S.qty[key];
  render();
}

function renderFX() {
  const wrap = document.getElementById('fixedItems');
  wrap.innerHTML = '';
  FX_DEF.forEach(fi => {
    const on = S.fx[fi.key];
    const row = document.createElement('div');
    row.className = 'toggle-row';
    row.onclick = () => { S.fx[fi.key] = !S.fx[fi.key]; renderFX(); render(); };
    row.innerHTML = `
      <div class="toggle ${on ? 'on' : ''}" id="tog-${fi.key}"></div>
      <div class="toggle-label">${fi.label}</div>
      <div class="toggle-hours">${fi.hours}h</div>
    `;
    wrap.appendChild(row);
  });
}

function calc() {
  const rate = parseInt(document.getElementById('rateInput').value) || 5000;
  const sc = SCALES[S.scale];
  const rows = [];
  let pageH = 0;

  PT_DEF.forEach(pt => {
    const q = S.qty[pt.key] || 0;
    if (!q) return;
    const des = pt.scaleKey ? sc.top.design : pt.design;
    const cod = pt.scaleKey ? sc.top.coding : pt.coding;
    const h = (des + cod) * q;
    pageH += h;
    rows.push({ label: pt.label, cls: pt.cls, qty: q, design: des * q, coding: cod * q, h, yen: h * rate, note: pt.note || '' });
  });

  const dirH = Math.ceil(pageH * 0.2);
  rows.push({ label: 'ディレクション費', cls: 'bd', qty: null, design: null, coding: null, h: dirH, yen: dirH * rate, note: 'ページ制作合計×20%', isDir: true });

  let fxH = 0;
  FX_DEF.forEach(fi => {
    if (!S.fx[fi.key]) return;
    fxH += fi.hours;
    rows.push({ label: fi.label, cls: fi.cls, qty: 1, design: 0, coding: fi.hours, h: fi.hours, yen: fi.hours * rate, note: '固定' });
  });

  const total = pageH + dirH + fxH;
  return { rows, pageH, dirH, fxH, total, totalYen: total * rate, rate };
}

function render() {
  const { rows, total, totalYen, rate } = calc();
  const sc = SCALES[S.scale];
  const client = document.getElementById('clientName').value;

  document.getElementById('scaleInfo').innerHTML =
    `<span>規模：</span>${sc.label}　<span>TOP：</span>デザイン${sc.top.design}h + 構築${sc.top.coding}h　<span>単価：</span>¥${rate.toLocaleString()}/h`;
  document.getElementById('clientLabel').textContent = client;

  const wrap = document.getElementById('tableWrap');
  const hasPages = rows.some(r => !r.isDir);

  if (!hasPages) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>ページ種別を追加してください</p></div>`;
    return;
  }

  let html = `<table><thead><tr>
    <th>項目</th><th>件数</th><th>デザイン(h)</th><th>構築(h)</th><th>小計(h)</th><th>金額（税抜）</th><th style="text-align:left">備考</th>
  </tr></thead><tbody>`;

  rows.forEach(r => {
    const q = r.qty !== null ? r.qty : '—';
    const des = r.design !== null ? r.design : '—';
    const cod = r.coding !== null ? r.coding : '—';
    const badgeLabel = r.cls === 'bt' ? 'TOP' : r.cls === 'bf' ? '固定' : r.cls === 'bc' ? 'カスタム' : r.cls === 'bp' ? '投稿' : r.cls === 'bfm' ? 'フォーム' : r.cls === 'bd' ? 'DIR' : r.cls === 'bw' ? 'WP' : 'DBG';
    html += `<tr>
      <td class="row-label">${r.label}<span class="rbadge ${r.cls}">${badgeLabel}</span></td>
      <td>${q}</td><td>${des}</td><td>${cod}</td><td>${r.h}</td><td>¥${r.yen.toLocaleString()}</td>
      <td style="text-align:left;font-size: 13px;color:var(--text3)">${r.note || ''}</td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td>合計（税抜）</td><td>—</td><td>—</td><td>—</td><td>${total}h</td><td>¥${totalYen.toLocaleString()}</td><td></td>
  </tr></tfoot></table>`;

  wrap.innerHTML = html;
}

function exportCSV() {
  const { rows, total, totalYen, rate } = calc();
  const client = document.getElementById('clientName').value || '未設定';
  const notes = document.getElementById('notesInput').value;
  let csv = '\uFEFF';
  csv += `Web制作見積もり,${client},${new Date().toLocaleDateString('ja-JP')}\n`;
  csv += `規模,${SCALES[S.scale].label},単価,¥${rate.toLocaleString()}/h\n\n`;
  csv += `項目,件数,デザイン(h),構築(h),小計(h),金額（税抜）,備考\n`;
  rows.forEach(r => {
    csv += `${r.label},${r.qty ?? ''},${r.design ?? ''},${r.coding ?? ''},${r.h},¥${r.yen.toLocaleString()},${r.note}\n`;
  });
  csv += `\n合計（税抜）,,,,${total}h,¥${totalYen.toLocaleString()},単価¥${rate.toLocaleString()}/h\n`;
  if (notes) csv += `\n備考\n${notes}\n`;

  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `見積もり_${client}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSVをダウンロードしました');
}

function copyText() {
  const { rows, total, totalYen, rate } = calc();
  const client = document.getElementById('clientName').value || '未設定';
  let t = `【Web制作 見積もり】${client}\n規模：${SCALES[S.scale].label} / 単価：¥${rate.toLocaleString()}/h\n${'─'.repeat(42)}\n`;
  rows.forEach(r => { t += `${r.label.padEnd(16)} ${String(r.h + 'h').padStart(5)}  ¥${r.yen.toLocaleString()}\n`; });
  t += `${'─'.repeat(42)}\n合計（税抜）         ${total}h  ¥${totalYen.toLocaleString()}\n`;
  const notes = document.getElementById('notesInput').value;
  if (notes) t += `\n備考：\n${notes}`;
  navigator.clipboard.writeText(t).then(() => toast('クリップボードにコピーしました'));
}

function resetAll() {
  S.qty = { top: 0, fixed: 0, custom: 0, post: 0, form: 0 };
  S.fx = { wp: true, debug: true };
  document.getElementById('clientName').value = '';
  document.getElementById('notesInput').value = '';
  renderPT(); renderFX(); render();
  toast('リセットしました');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// GAS連携
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwoWmCFHG4LBhBRTArb07h9B3iGwWPEEIwTLGN8y198UjK9XcQqGlkAvrXCosTWzUb2/exec';

async function saveEstimate() {
  const client = document.getElementById('clientName').value.trim();
  if (!client) { toast('クライアント名を入力してください'); return; }

  const { total, totalYen, rate } = calc();
  if (total === 0) { toast('ページ種別を追加してください'); return; }

  const btn = document.querySelector('.btn-save');
  btn.textContent = '保存中…'; btn.disabled = true;

  const payload = {
    date: new Date().toLocaleDateString('ja-JP'),
    client,
    scale: SCALES[S.scale].label,
    totalH: total,
    totalYen,
    rate,
    qty: S.qty,
    fx: S.fx,
    notes: document.getElementById('notesInput').value
  };

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    toast('✅ スプレッドシートに保存しました！');
  } catch(e) {
    toast('❌ 保存に失敗しました');
  } finally {
    btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> 保存';
    btn.disabled = false;
  }
}

let historyData = [];

async function loadHistory() {
  const wrap = document.getElementById('historyWrap');
  wrap.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>読み込み中…</p></div>';
  try {
    const res = await fetch(GAS_URL + '?t=' + Date.now());
    const json = await res.json();
    historyData = json.data || [];
    renderHistory(historyData);
  } catch(e) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>読み込みに失敗しました</p></div>';
  }
}

function renderHistory(data) {
  const wrap = document.getElementById('historyWrap');
  if (!data.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>まだ履歴がありません</p></div>';
    return;
  }
  const SCALE_LABELS = { '小規模（5P以下）': '小', '通常（6〜16P）': '通常', '大規模（17P+）': '大規模' };
  wrap.innerHTML = '<div class="history-list">' + data.map(d => `
    <div class="history-card" onclick="loadFromHistory(${JSON.stringify(d).replace(/"/g, '&quot;')})">
      <div class="hc-top">
        <div class="hc-client">${d.client}</div>
        <div class="hc-date">${d.date ? new Date(d.date).toLocaleDateString('ja-JP') : ''}</div>
      </div>
      <div class="hc-bottom">
        <div class="hc-amount">¥${Number(d.totalYen).toLocaleString()}</div>
        <div class="hc-scale">${d.scale}</div>
        <div class="hc-hours">${d.totalH}h / ¥${Number(d.rate).toLocaleString()}/h</div>
      </div>
      ${d.notes ? `<div class="hc-notes">📝 ${d.notes}</div>` : ''}
    </div>
  `).join('') + '</div>';
}

function filterHistory() {
  const q = document.getElementById('historySearch').value;
  const filtered = q ? historyData.filter(d => d.client.includes(q) || d.scale.includes(q)) : historyData;
  renderHistory(filtered);
}

function loadFromHistory(d) {
  // 見積もりタブに切り替えてデータをロード
  switchTab('estimate');
  document.getElementById('clientName').value = d.client;
  setScale(Object.keys(SCALES).find(k => SCALES[k].label === d.scale) || 'normal');
  S.qty = { top: d.qty.top||0, fixed: d.qty.fixed||0, custom: d.qty.custom||0, post: d.qty.post||0, form: d.qty.form||0 };
  S.fx = { wp: !!d.fx.wp, debug: !!d.fx.debug };
  document.getElementById('notesInput').value = d.notes || '';
  document.getElementById('rateInput').value = d.rate || 5000;
  renderPT(); renderFX(); render();
  toast(`「${d.client}」を読み込みました`);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tabEstimate').style.display = tab === 'estimate' ? '' : 'none';
  document.getElementById('tabHistory').style.display = tab === 'history' ? '' : 'none';
  document.querySelector(`.tab:${tab === 'estimate' ? 'first' : 'last'}-child`).classList.add('active');
  if (tab === 'history') loadHistory();
}

init();
</script>
